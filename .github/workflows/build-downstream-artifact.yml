name: Build NAS downstream artifact

on:
  workflow_dispatch:
    inputs:
      release_manifest:
        description: Release manifest to build
        required: true
        default: downstream/releases/2026.7.1-2-nas.7.json
        type: string
      publish:
        description: Publish the verified image to GHCR
        required: true
        default: false
        type: boolean

concurrency:
  group: build-nas-downstream-${{ inputs.release_manifest }}
  cancel-in-progress: false

jobs:
  build:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Resolve release and enforce fail-fast dependency evidence
        id: release
        env:
          RELEASE_MANIFEST: ${{ inputs.release_manifest }}
        run: |
          set -euo pipefail
          [[ "$RELEASE_MANIFEST" =~ ^downstream/releases/[0-9A-Za-z._+-]+\.json$ ]]
          node downstream/scripts/validate-release.mjs "$RELEASE_MANIFEST"
          node - "$RELEASE_MANIFEST" >> "$GITHUB_OUTPUT" <<'NODE'
          const manifest = require(`./${process.argv[2]}`);
          if (manifest.status === "blocked") throw new Error("blocked releases cannot be built or published");
          const codex = manifest.externalPlugins.find((plugin) => plugin.id === "codex");
          if (!codex) throw new Error("release manifest must freeze the Codex external plugin");
          if (!codex.artifact) throw new Error("release manifest must pin a patched Codex artifact");
          const qmd = manifest.runtimeTools?.find((tool) => tool.id === "qmd");
          if (!qmd) throw new Error("release manifest must freeze the QMD runtime");
          if (!qmd.artifact) throw new Error("release manifest must pin a QMD artifact");
          const values = {
            artifact_sha256: manifest.artifact.sha256,
            artifact_url: manifest.artifact.url,
            codex_artifact_sha256: codex.artifact.sha256,
            codex_artifact_url: codex.artifact.url,
            codex_integrity: codex.integrity,
            codex_package: codex.package,
            codex_tarball: codex.tarball,
            codex_version: codex.version,
            image_tag: `nas-${manifest.releaseId.replace("+", "-")}`,
            qmd_artifact_sha256: qmd.artifact.sha256,
            qmd_artifact_url: qmd.artifact.url,
            qmd_integrity: qmd.integrity,
            qmd_package: qmd.package,
            qmd_tarball: qmd.tarball,
            qmd_version: qmd.version,
            source_commit: manifest.source.commit,
            version: manifest.npm.version,
          };
          for (const [key, value] of Object.entries(values)) console.log(`${key}=${value}`);
          NODE

      - name: Freeze external plugin registry state
        env:
          CODEX_INTEGRITY: ${{ steps.release.outputs.codex_integrity }}
          CODEX_PACKAGE: ${{ steps.release.outputs.codex_package }}
          CODEX_TARBALL: ${{ steps.release.outputs.codex_tarball }}
          CODEX_VERSION: ${{ steps.release.outputs.codex_version }}
          QMD_INTEGRITY: ${{ steps.release.outputs.qmd_integrity }}
          QMD_PACKAGE: ${{ steps.release.outputs.qmd_package }}
          QMD_TARBALL: ${{ steps.release.outputs.qmd_tarball }}
          QMD_VERSION: ${{ steps.release.outputs.qmd_version }}
        run: |
          set -euo pipefail
          npm view "$CODEX_PACKAGE@$CODEX_VERSION" version dist.integrity dist.tarball --json > "$RUNNER_TEMP/codex-registry.json"
          npm view "$QMD_PACKAGE@$QMD_VERSION" version dist.integrity dist.tarball --json > "$RUNNER_TEMP/qmd-registry.json"
          node <<'NODE'
          const fs = require("node:fs");
          for (const runtime of [
            { id: "Codex", file: "codex-registry.json", prefix: "CODEX" },
            { id: "QMD", file: "qmd-registry.json", prefix: "QMD" },
          ]) {
            const current = JSON.parse(fs.readFileSync(`${process.env.RUNNER_TEMP}/${runtime.file}`, "utf8"));
            const expected = {
              version: process.env[`${runtime.prefix}_VERSION`],
              "dist.integrity": process.env[`${runtime.prefix}_INTEGRITY`],
              "dist.tarball": process.env[`${runtime.prefix}_TARBALL`],
            };
            for (const [field, value] of Object.entries(expected)) {
              if (current[field] !== value) throw new Error(`${runtime.id} registry ${field} changed`);
            }
          }
          NODE

      - name: Download and verify exact tarball
        env:
          ARTIFACT_SHA256: ${{ steps.release.outputs.artifact_sha256 }}
          ARTIFACT_URL: ${{ steps.release.outputs.artifact_url }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          curl --fail --location --proto '=https' --tlsv1.2 "$ARTIFACT_URL" --output openclaw-current.tgz
          printf '%s  %s\n' "$ARTIFACT_SHA256" openclaw-current.tgz | sha256sum -c -
          tar -xOf openclaw-current.tgz package/package.json > /tmp/openclaw-package.json
          tar -xOf openclaw-current.tgz package/npm-shrinkwrap.json > /tmp/openclaw-shrinkwrap.json
          tar -tf openclaw-current.tgz > /tmp/openclaw-tar-files.txt
          node downstream/scripts/validate-packed-metadata.mjs \
            /tmp/openclaw-package.json \
            /tmp/openclaw-shrinkwrap.json \
            openclaw \
            "$VERSION"
          grep -q '^package/dist/extensions/discord/' /tmp/openclaw-tar-files.txt

      - name: Download and verify exact Codex plugin tarball
        env:
          CODEX_ARTIFACT_SHA256: ${{ steps.release.outputs.codex_artifact_sha256 }}
          CODEX_ARTIFACT_URL: ${{ steps.release.outputs.codex_artifact_url }}
          CODEX_VERSION: ${{ steps.release.outputs.codex_version }}
        run: |
          set -euo pipefail
          curl --fail --location --proto '=https' --tlsv1.2 "$CODEX_ARTIFACT_URL" --output codex-current.tgz
          printf '%s  %s\n' "$CODEX_ARTIFACT_SHA256" codex-current.tgz | sha256sum -c -
          tar -xOf codex-current.tgz package/package.json > /tmp/codex-package.json
          tar -xOf codex-current.tgz package/npm-shrinkwrap.json > /tmp/codex-shrinkwrap.json
          node downstream/scripts/validate-packed-metadata.mjs \
            /tmp/codex-package.json \
            /tmp/codex-shrinkwrap.json \
            @openclaw/codex \
            "$CODEX_VERSION"

      - name: Download and verify exact QMD runtime tarball
        env:
          QMD_ARTIFACT_SHA256: ${{ steps.release.outputs.qmd_artifact_sha256 }}
          QMD_ARTIFACT_URL: ${{ steps.release.outputs.qmd_artifact_url }}
          QMD_VERSION: ${{ steps.release.outputs.qmd_version }}
        run: |
          set -euo pipefail
          curl --fail --location --proto '=https' --tlsv1.2 "$QMD_ARTIFACT_URL" --output qmd-current.tgz
          printf '%s  %s\n' "$QMD_ARTIFACT_SHA256" qmd-current.tgz | sha256sum -c -
          tar -xOf qmd-current.tgz package/package.json > /tmp/qmd-package.json
          tar -xOf qmd-current.tgz package/npm-shrinkwrap.json > /tmp/qmd-shrinkwrap.json
          node downstream/scripts/validate-packed-metadata.mjs \
            /tmp/qmd-package.json \
            /tmp/qmd-shrinkwrap.json \
            @tobilu/qmd \
            "$QMD_VERSION"

      - name: Smoke-test exact tarball
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          smoke_prefix="$RUNNER_TEMP/openclaw-smoke"
          npm install --prefix "$smoke_prefix" --ignore-scripts=false ./openclaw-current.tgz
          "$smoke_prefix/node_modules/.bin/openclaw" --version | grep -F "$VERSION"
          node - "$smoke_prefix" <<'NODE'
          const fs = require("node:fs");
          const path = require("node:path");
          const root = process.argv[2];
          for (const dependency of ["@discordjs/voice", "discord-api-types", "opusscript"]) {
            const manifest = path.join(root, "node_modules", dependency, "package.json");
            const metadata = JSON.parse(fs.readFileSync(manifest, "utf8"));
            if (metadata.name !== dependency) throw new Error(`missing ${dependency}`);
          }
          NODE

      - name: Smoke-test external Codex plugin and scoped RPC
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          bash downstream/scripts/smoke-external-plugin.sh \
            "$GITHUB_WORKSPACE/openclaw-current.tgz" \
            "$GITHUB_WORKSPACE/codex-current.tgz" \
            codex \
            "$VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to GHCR
        if: inputs.publish
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and optionally publish image
        id: image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: downstream/Dockerfile.artifact
          platforms: linux/amd64
          build-args: |
            CODEX_TARBALL_SHA256=${{ steps.release.outputs.codex_artifact_sha256 }}
            CODEX_VERSION=${{ steps.release.outputs.codex_version }}
            OPENCLAW_TARBALL_SHA256=${{ steps.release.outputs.artifact_sha256 }}
            OPENCLAW_SOURCE_COMMIT=${{ steps.release.outputs.source_commit }}
            OPENCLAW_VERSION=${{ steps.release.outputs.version }}
            QMD_TARBALL_SHA256=${{ steps.release.outputs.qmd_artifact_sha256 }}
            QMD_VERSION=${{ steps.release.outputs.qmd_version }}
          tags: ghcr.io/ashleyhollis/openclaw:${{ steps.release.outputs.image_tag }}
          push: ${{ inputs.publish }}
          load: ${{ !inputs.publish }}
          sbom: ${{ inputs.publish }}
          provenance: ${{ inputs.publish && 'mode=max' || 'false' }}

      - name: Smoke-test built image and baked Codex plugin
        env:
          IMAGE_TAG: ${{ steps.release.outputs.image_tag }}
          CODEX_VERSION: ${{ steps.release.outputs.codex_version }}
          QMD_VERSION: ${{ steps.release.outputs.qmd_version }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          image="ghcr.io/ashleyhollis/openclaw:${IMAGE_TAG}"
          if [[ "${{ inputs.publish }}" == "true" ]]; then
            docker pull "$image"
          fi
          docker run --rm \
            --network none \
            --volume "$GITHUB_WORKSPACE/downstream/scripts/smoke-image-runtime.mjs:/tmp/smoke-image-runtime.mjs:ro" \
            --env EXPECTED_CODEX_VERSION="$CODEX_VERSION" \
            --env EXPECTED_OPENCLAW_VERSION="$VERSION" \
            --env EXPECTED_QMD_VERSION="$QMD_VERSION" \
            --entrypoint node \
            "$image" \
            /tmp/smoke-image-runtime.mjs

      - name: Scan image for fixable critical vulnerabilities
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: ghcr.io/ashleyhollis/openclaw:${{ steps.release.outputs.image_tag }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
          scanners: vuln

      - name: Report immutable image
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          IMAGE_TAG: ${{ steps.release.outputs.image_tag }}
        run: |
          {
            echo "### NAS downstream image"
            echo
            echo "- Tag: \`ghcr.io/ashleyhollis/openclaw:${IMAGE_TAG}\`"
            echo "- Digest: \`${IMAGE_DIGEST}\`"
            echo "- Published: \`${{ inputs.publish }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
